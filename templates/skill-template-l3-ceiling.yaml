# L3 标杆案例模板

# 用途: 复杂系统型Skill（多源数据、多步推理、前端交互）
# 复杂度: 很高
# 预计开发时间: 8-12小时

skill:
  name: "ceiling-case"
  version: "1.0.0"
  description: "标杆深度案例，展示完整工程化链路"
  
  components:
    - name: "自然语言理解"
      type: "llm"
    - name: "知识库"
      type: "vector_db"
    - name: "数据查询"
      type: "mcp_connector"
    - name: "可视化"
      type: "frontend"
  
  workflow:
    - step: "用户输入"
    - step: "意图理解"
    - step: "知识库检索"
    - step: "数据查询（MCP）"
    - step: "结果聚合"
    - step: "可视化渲染"
    - step: "来源引用"
